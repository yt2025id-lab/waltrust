<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#FFFEF2" rx="12" ry="12"/>

  <!-- Shield - outer border -->
  <path d="M200 40 L320 100 L320 220 C320 300 200 360 200 360 C200 360 80 300 80 220 L80 100 Z"
        fill="#FFFEF2" stroke="#0A0A0A" stroke-width="10" stroke-linejoin="miter"/>

  <!-- Shield inner -->
  <path d="M200 65 L305 118 L305 220 C305 290 200 340 200 340 C200 340 95 290 95 220 L95 118 Z"
        fill="#00E58A" stroke="#0A0A0A" stroke-width="6" stroke-linejoin="miter"/>

  <!-- Shield core - darker green -->
  <path d="M200 90 L290 135 L290 220 C290 278 200 320 200 320 C200 320 110 278 110 220 L110 135 Z"
        fill="#FFFEF2" stroke="#0A0A0A" stroke-width="5" stroke-linejoin="miter"/>

  <!-- Checkmark inside shield -->
  <path d="M150 200 L185 240 L250 165"
        fill="none" stroke="#00E58A" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="8" fill="#FF3366" stroke="#0A0A0A" stroke-width="3"/>
  <circle cx="320" cy="80" r="6" fill="#FFD700" stroke="#0A0A0A" stroke-width="3"/>
  <circle cx="90" cy="330" r="5" fill="#00E58A" stroke="#0A0A0A" stroke-width="2"/>
  <circle cx="310" cy="330" r="7" fill="#FF3366" stroke="#0A0A0A" stroke-width="3"/>

  <!-- Brutalist corner accents -->
  <rect x="20" y="20" width="16" height="16" fill="#0A0A0A"/>
  <rect x="364" y="20" width="16" height="16" fill="#0A0A0A"/>
  <rect x="20" y="364" width="16" height="16" fill="#0A0A0A"/>
  <rect x="364" y="364" width="16" height="16" fill="#0A0A0A"/>
</svg>
